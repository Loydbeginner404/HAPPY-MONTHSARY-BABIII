<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Happy Monthsary</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">
  <div class="card">
    <div class="header">
      <div class="badge">MONTHSARY SPECIAL</div>
      <h1>Happy Monthsary</h1>
      <p>Para sa pinaka special kong babiii</p>
    </div>

    <div class="photoBox">
      <div class="photo">
        <img class="slide active" src="me and you.jpeg" alt="photo 1">
  <img class="slide" src="baboii7.jpeg" alt="photo 3">
        <img class="slide" src="babiii2.jpeg" alt="photo 4">
        <img class="slide" src="babiii3.jpeg" alt="photo 5">
        <img class="slide" src="babiii4.jpeg" alt="photo 6">
        <img class="slide" src="babiii5.jpeg" alt="photo 7">

        <div class="photoOverlay"></div>
        <div class="caption" id="caption">Our favorite memory</div>
        <div class="counter" id="counter">1 / 8</div>
      </div>
    </div>

    <div class="message">
      <h2 id="title">To my babiii</h2>
      <p id="text"></p>
    </div>

    <div class="timeline">
      <div class="line"><div class="fill" id="fill"></div></div>
      <div class="timelineText" id="timelineText">Memory 1 of 8</div>
    </div>

    <div class="controls">
      <button id="prevBtn">PREV</button>
      <button id="nextBtn">NEXT</button>
      <button id="surpriseBtn">SURPRISE</button>
      <button id="heartsBtn">HEARTS</button>
      <button id="musicBtn" class="music">PLAY MUSIC</button>
    </div>
  </div>
</div>

<div class="final" id="final">
  <div class="finalCard">
    <h2>I love you so much babiii 🤍</h2>
    <p>Happy Monthsary, babiii ko. Thank you kasi ikaw yung dumating sa buhay ko. Ikaw pa rin ang pipiliin ko.</p>
    <button id="closeFinal">BACK</button>
  </div>
</div>

<audio id="music" loop>
  <source src="Kalapastangan - fitterkarma.mp4" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
